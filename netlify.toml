# Netlify configuration - deploy pre-built Next.js static output
[build]
  command = "echo 'Deploying pre-built static site'"
  publish = ".next/server/app"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# Redirect all routes to index.html (for static SPA behavior)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
