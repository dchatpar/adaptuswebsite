# Netlify configuration - deploy static site from public folder
[build]
  command = "echo 'Static deployment - files already prepared'"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# Handle Next.js static files
[[redirects]]
  from = "/_next/static/*"
  to = "/_next/static/:splat"
  status = 200

# Handle images
[[redirects]]
  from = "/images/*"
  to = "/images/:splat"
  status = 200

# Redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
