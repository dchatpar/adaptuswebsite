# Netlify configuration for pre-built Next.js output
[build]
  command = "echo 'Deploying pre-built static site'"
  publish = ".next/server/app"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# Netlify redirects for SPA behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
