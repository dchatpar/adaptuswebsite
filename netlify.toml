# Netlify configuration - deploy static site from public folder
[build]
  command = "echo 'Static deployment - files already prepared'"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# Handle static assets - map /_next/static/* to /_next/static/*
[[redirects]]
  from = "/_next/static/*"
  to = "/_next/static/:splat"
  status = 200

# Handle images
[[redirects]]
  from = "/images/*"
  to = "/images/:splat"
  status = 200

# Serve root assets
[[redirects]]
  from = "/manifest.json"
  to = "/manifest.json"
  status = 200

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.ico"
  status = 200

# SPA fallback - all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
