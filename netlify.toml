[build]
  command = "echo 'Pre-built site - deployment only'"
  publish = ".next/server/app"

[build.environment]
  NODE_VERSION = "20"

# Disable Next.js plugin to avoid build attempts
[build.plugins]
  package = ""

# Route all requests to HTML files
